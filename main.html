<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>
    <h1>To-Do List</h1>
    <input id="task" type="text" placeholder="Enter task">
    <button id="add">Add</button>
    <ul id="tasks"></ul>
    <div id="step-counter">
        <p>Steps: <span id="steps">0</span></p>
        <button id="increment-steps">+</button>
        <button id="decrement-steps">-</button>
    </div>
    <div id="calendar">
        <input id="date" type="date">
        <button id="add-date">Add Date</button>
        <ul id="dates"></ul>
    </div>

    <script src="todo.js"></script>
</body>
</html>
