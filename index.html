<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        #calculator {
            width: 200px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #display {
            width: 100%;
            height: 40px;
            margin-bottom: 20px;
            padding: 10px;
            font-size: 24px;
            text-align: right;
            border: none;
        }
        .button {
            width: 45px;
            height: 45px;
            margin: 5px;
            padding: 10px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background-color: orange;
            color: #fff;
            cursor: pointer;
        }
        .button:hover {
            background-color: #ff9900;
        }
    </style>
</head>
<body>
    <div id="calculator">
        <input type="text" id="display" disabled>
        <div>
            <button class="button" onclick="clickButton('7')">7</button>
            <button class="button" onclick="clickButton('8')">8</button>
            <button class="button" onclick="clickButton('9')">9</button>
        </div>
        <div>
            <button class="button" onclick="clickButton('4')">4</button>
            <button class="button" onclick="clickButton('5')">5</button>
            <button class="button" onclick="clickButton('6')">6</button>
        </div>
        <div>
            <button class="button" onclick="clickButton('1')">1</button>
            <button class="button" onclick="clickButton('2')">2</button>
            <button class="button" onclick="clickButton('3')">3</button>
        </div>
        <div>
            <button class="button" onclick="clickButton('0')">0</button>
            <button class="button" onclick="clickButton('.')">.</button>
            <button class="button" onclick="calculateResult()">=</button>
            <button class="button" onclick="clickButton('+')">+</button>
        </div>
        <div>
            <button class="button" onclick="clickButton('-')">-</button>
            <button class="button" onclick="clickButton('*')">*</button>
            <button class="button" onclick="clickButton('/')">/</button>
            <button class="button" onclick="clearDisplay()">C</button>
        </div>
    </div>
    <script>
        let currentNumber = "";
        let previousNumber = "";
        let operation = "";
        function clickButton(value) {
            if (value === "+" || value === "-" || value === "*" || value === "/") {
                operation = value;
                previousNumber = currentNumber;
                currentNumber = "";
            } else {
                currentNumber += value;
            }
            updateDisplay();
        }
        function calculateResult() {
            if (operation === "+") {
                result = parseFloat(previousNumber) + parseFloat(currentNumber);
            } else if (operation === "-") {
                result = parseFloat(previousNumber) - parseFloat(currentNumber);
            } else if (operation === "*") {
                result = parseFloat(previousNumber) * parseFloat(currentNumber);
            } else if (operation === "/") {
                result = parseFloat(previousNumber) / parseFloat(currentNumber);
            }
            currentNumber = result.toString();
            updateDisplay();
        }
        function updateDisplay() {
            document.getElementById("display").value = currentNumber;
        }
        function clearDisplay() {
            currentNumber = "";
            previousNumber = "";
            operation = "";
            updateDisplay();
        }
    </script>
</body>
</html>
